[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "functions"

[functions]
  node_bundler     = "zisi"
  # server.cjs is local-dev only (runs node-cron scheduler). Exclude from Netlify.
  excluded_patterns = ["functions/server.cjs"]

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200